linters-settings:
    errorlint:
        errorf: true # Ensure fmt.Errorf uses %w for wrapping errors
    revive:
        rules:
            - name: unexported-return
              disabled: true # Acceptable for test helpers
            - name: unused-parameter
              disabled: true # Acceptable for mock/stub implementations
    gosec:
        excludes:
            - G304 # File path from variable — legitimate in config/log loading
    gocritic:
        enabled-tags:
            - diagnostic
            - style
        disabled-checks:
            - hugeParam # Not performance-critical

linters:
    disable-all: true
    enable:
        - errcheck
        - errorlint
        - nilerr
        - revive
        - staticcheck
        - gosec
        - noctx
        - unused
        - gocritic
        - misspell

run:
    modules-download-mode: readonly
    allow-parallel-runners: true
    timeout: 5m
