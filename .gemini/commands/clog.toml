description = "Review Gobot logs and update the Strategic Backlog"
prompt = '''
Review the recent Gobot strategic logs and evaluate the most recent activity.
Identify any issues, errors, or anomalies that indicate a bug or a violation of strategic mandates.

### STRATEGIC MANDATES
- Zero Core Pollution: All logic must reside in `internal/` or `cmd/`.
- Resilience: Telegram polling must handle network flaps gracefully.
- Security: Never log or leak API keys or tokens.

### LOG LOCATION
D:\Gobot_Storage\logs\gobot.log

### RECENT STRATEGIC LOGS
!{powershell -ExecutionPolicy Bypass -NoProfile -File scripts/get_logs.ps1}

### CURRENT STRATEGIC BACKLOG
@{ .private/backlog/BACKLOG.md}

### USER INSTRUCTIONS
{{args}}

## Tracking Instructions
For all NEW issues found in the logs:
1. Create a new specification file in `.private/backlog/G-BXXX_[Title].md` using the standard `.private/backlog/TEMPLATE.md`.
2. Increment the bug ID correctly (e.g., G-B004).
3. Add the new entry to the "Active Bugs" table in `.private/backlog/BACKLOG.md`.
4. Do NOT duplicate existing issues.

## Reporting
- Summarize any new issues discovered and added to the backlog.
- If no new issues were found, state that the logs are "Strategic Green."
- Offer to begin an implementation plan for the highest priority bug.
'''
