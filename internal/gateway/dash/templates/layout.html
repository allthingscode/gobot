<!DOCTYPE html>
<html>
<head>
    <title>GoBot Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; border-right: 1px solid #dee2e6; background-color: #fff; }
        .nav-link { color: #333; }
        .nav-link.active { font-weight: bold; background-color: #e9ecef; }
        .card { border-radius: 8px; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); margin-bottom: 1.5rem; }
        .status-ok { color: #198754; }
        .status-err { color: #dc3545; }
        .status-wrn { color: #ffc107; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block sidebar collapse p-3">
                <h4 class="mb-4">GoBot Dashboard</h4>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link {{if eq .ActiveNav "home"}}active{{end}}" href="/dash/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{if eq .ActiveNav "sessions"}}active{{end}}" href="/dash/sessions">Sessions</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{if eq .ActiveNav "memory"}}active{{end}}" href="/dash/memory">Memory</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{if eq .ActiveNav "cron"}}active{{end}}" href="/dash/cron">Cron</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{if eq .ActiveNav "doctor"}}active{{end}}" href="/dash/doctor">Doctor</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{if eq .ActiveNav "logs"}}active{{end}}" href="/dash/logs">Logs</a>
                    </li>
                </ul>
            </nav>
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                {{template "content" .}}
            </main>
        </div>
    </div>
</body>
</html>
