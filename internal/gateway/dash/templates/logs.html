{{define "content"}}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">System Logs</h1>
</div>

<div class="card">
    <div
        class="card-body p-0"
        id="log-tail-container"
        hx-get="/dash/logs?partial=true"
        hx-trigger="load, every 5s"
        hx-swap="innerHTML"
    >
        {{template "log_tail" .}}
    </div>
</div>
{{end}}

{{define "log_tail"}}
<pre class="mb-0 p-3 bg-dark text-light small" style="max-height: 70vh; overflow-y: auto; white-space: pre-wrap;">{{.LogTail}}</pre>
{{end}}
