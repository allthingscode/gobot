name: CI

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["**"]

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
                    cache: true
            -   name: golangci-lint
                uses: golangci/golangci-lint-action@v6
                with:
                    args: --modules-download-mode=readonly

    vuln-check:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
                    cache: true
            -   name: Install govulncheck
                run: go install golang.org/x/vuln/cmd/govulncheck@latest
            -   name: Run govulncheck
                run: govulncheck ./...

    test:
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
        runs-on: ${{ matrix.os }}
        steps:
            -   uses: actions/checkout@v4

            -   name: Set up Go
                uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
                    cache: true

            -   name: Vet
                run: go vet -mod=readonly ./...

            -   name: Test
                run: go test -race -mod=readonly ./...

    mod-tidy:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
                    cache: true
            -   name: Verify go mod tidy
                run: |
                    go mod tidy
                    git diff --exit-code go.mod go.sum

    coverage:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
                    cache: true
            -   name: Coverage check
                # Current coverage is ~60.4%. Goal is 80%. Ratchet up 2% per sprint.
                run: |
                    go test -mod=readonly -coverprofile=coverage.out ./internal/... ./cmd/...
                    go tool cover -func=coverage.out | tail -1
                    COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
                    echo "Total coverage: ${COVERAGE}%"
                    awk "BEGIN { if (${COVERAGE} < 59.0) { print \"Coverage ${COVERAGE}% is below 59.0% threshold\"; exit 1 } }"

    doc-lint:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
                    cache: true
            -   name: Documentation Lint
                run: go run scripts/doc_lint.go

    parity-check:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
                    cache: true
            -   name: Upstream Reference Parity
                run: go run scripts/parity_check.go
