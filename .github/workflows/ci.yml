name: CI

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["**"]

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
                    cache: true
            -   name: golangci-lint
                uses: golangci/golangci-lint-action@v7
                with:
                    version: v2.11.4
                    args: --modules-download-mode=readonly

    vuln-check:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
                    cache: true
            -   name: Install govulncheck
                run: go install golang.org/x/vuln/cmd/govulncheck@v1.2.0
            -   name: Run govulncheck
                run: govulncheck ./...

    test:
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
        runs-on: ${{ matrix.os }}
        steps:
            -   uses: actions/checkout@v4

            -   name: Set up Go
                uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
                    cache: true

            -   name: Vet
                run: go vet -mod=readonly ./...

            -   name: Test
                run: go test -race -mod=readonly ./...

    mod-tidy:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
                    cache: true
            -   name: Verify go mod tidy
                run: |
                    go mod tidy
                    git diff --exit-code go.mod go.sum

    coverage:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
                    cache: true
            -   name: Coverage check
                run: |
                    mkdir -p artifacts
                    go test -mod=readonly -coverprofile=artifacts/coverage.out ./internal/... ./cmd/...
                    go tool cover -func=artifacts/coverage.out | tail -1
                    COVERAGE=$(go tool cover -func=artifacts/coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
                    echo "Total coverage: ${COVERAGE}%"
                    awk "BEGIN { if (${COVERAGE} < 65.0) { print \"Coverage ${COVERAGE}% is below 65.0% threshold\"; exit 1 } }"

    coverage-windows:
        runs-on: windows-latest
        defaults:
            run:
                shell: bash
        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
                    cache: true
            -   name: Windows Coverage run
                run: |
                    mkdir -p artifacts
                    go test -mod=readonly -coverprofile=artifacts/coverage-windows.out ./internal/... ./cmd/...
                    go tool cover -func=artifacts/coverage-windows.out | tail -1
            -   name: Upload Windows Coverage Artifact
                uses: actions/upload-artifact@v4
                with:
                    name: coverage-windows
                    path: artifacts/coverage-windows.out

    doc-lint:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
                    cache: true
            -   name: Documentation Lint
                run: go run scripts/doc_lint.go

    bench:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-go@v5
                with:
                    go-version-file: go.mod
                    cache: true
            -   name: Run benchmarks
                run: |
                    mkdir -p artifacts
                    go test -mod=readonly -bench=. -benchmem -run='^$' ./internal/... ./cmd/... | tee artifacts/bench.txt
            -   name: Upload benchmark results
                uses: actions/upload-artifact@v4
                with:
                    name: bench-${{ github.sha }}
                    path: artifacts/bench.txt
