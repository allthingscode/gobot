name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Get version info
        id: vars
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          COMMIT=$(git rev-parse --short HEAD)
          echo "COMMIT=${COMMIT}" >> $GITHUB_ENV
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "BUILD_TIME=${BUILD_TIME}" >> $GITHUB_ENV

      - name: Build Windows binary
        run: |
          LDFLAGS="-X main.version=${VERSION} -X main.commitHash=${COMMIT} -X main.buildTime=${BUILD_TIME}"
          GOOS=windows GOARCH=amd64 go build -mod=vendor -ldflags "${LDFLAGS}" -o gobot-${VERSION}-windows-amd64.exe ./cmd/gobot

      - name: Build Linux binary
        run: |
          LDFLAGS="-X main.version=${VERSION} -X main.commitHash=${COMMIT} -X main.buildTime=${BUILD_TIME}"
          GOOS=linux GOARCH=amd64 go build -mod=vendor -ldflags "${LDFLAGS}" -o gobot-${VERSION}-linux-amd64 ./cmd/gobot

      - name: Pre-flight validation
        run: |
          go run scripts/validate_release.go
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            gobot-*-windows-amd64.exe
            gobot-*-linux-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
